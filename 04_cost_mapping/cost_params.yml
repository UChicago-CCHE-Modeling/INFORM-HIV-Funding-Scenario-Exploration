# =============================================================================
# cost_params.yml -- RAW INPUT parameters for the HIV cost-mapping analysis
# -----------------------------------------------------------------------------
# This file mirrors the literal values defined in R/parameters.R
# (cost_mapping_params()). ONLY raw inputs live here. Derived quantities
# (N_HIV_neg, prop_MSM_*, G_ART_baseline, G_PrEP_baseline, P_ART_baseline,
# P_PrEP_baseline) are intentionally EXCLUDED -- they are computed in R.
#
# Every value carries a provenance comment: (a) what it is, and (b) where it
# came from. Sources verified against:
#   - hiv-funding-paper-tmp/paper.tex
#   - hiv-funding-paper-tmp/supplementary_material.tex
#     (Sec. "Mapping Funding Reductions to PrEP and ART use",
#      \label{sec:supp-expenditure-estimates})
#   - hiv-funding-paper-tmp/costs_bibliography.bib
#
# Parseable by yaml::read_yaml(). Where an R value is a sum of line items, the
# breakdown is preserved as a list plus a documented `total`.
# =============================================================================

# ---- Inflation --------------------------------------------------------------
inflation:
  # Annual US inflation rates (%), one per year 2019->2025 (7 values), used by
  # calculate_cost_2025() to compound 2018 unit costs forward to 2025 USD.
  # Compounded factor prod(1 + r/100) = 1.2737.
  # DISCREPANCY: the paper (supplementary_material.tex line 828) cites a BLS
  # CPI-U ratio for 2019--2025 of x1.259, NOT 1.2737. The individual yearly
  # rates below are NOT listed in the paper; treat as UNVERIFIED. The compounded
  # 1.2737 differs from the paper's stated 1.259 by ~1.2%. Flagged, not fixed.
  rate_19to25_pct: [2.2, 2.3, 1.4, 6.0, 5.6, 3.9, 3.3]

# ---- Unit costs (2018 USD components) ---------------------------------------
# UNVERIFIED - none of these 2018 line-item unit costs are reported anywhere in
# paper.tex or supplementary_material.tex. The paper presents only the finalized
# 2025 per-person figures (C_ART = $50,000, C_PrEP = $21,000). These 2018
# components appear to be intermediate build-up calculations not documented in
# the paper. Retained verbatim from R/parameters.R; sources unknown.
unit_costs_2018:
  # Cumulative annual clinical + lab cost, 2018 USD. Sum of 7 line items.
  # total = 1458.25. UNVERIFIED - line items not found in paper.
  annual_cumulative_clinical_lab_cost:
    components: [120.40, 140.36, 16.92, 33.13, 28.54, 66.20, 1052.70]
    total: 1458.25
  # First-year physician-visit total cost, 2018 USD. UNVERIFIED - not in paper.
  first_year_physician_visit_total_cost: 671.01
  # Quarterly physician-visit cost, 2018 USD, as 92.47 * 4 = 369.88.
  # UNVERIFIED - not in paper.
  quarterly_physician_visit_cost:
    per_visit: 92.47
    visits_per_year: 4
    total: 369.88
  # Weighted-average 30-day PrEP medication cost, 2018 USD. UNVERIFIED - the
  # paper discusses PrEP medication WAC/generic ranges (supp lines 838-843) but
  # does not report this 349.70 figure.
  weighted_average_prep_meds_30days: 349.70

# ---- Healthcare / ART costs (2025 USD) --------------------------------------
# UNVERIFIED - these specific 2025 healthcare/ART cost components are not
# reported in the paper. NOTE: the paper's finalized C_ART = $50,000 is
# described as the MIDPOINT of a payer-stratified range from Bingham et al. 2021
# ($45,600 government-payer lower bound to ~$52,000 WAC upper bound; supp lines
# 822-832). It is NOT built up from the line items below. These values feed a
# separate cost accounting in the pipeline; sources not documented in paper.
healthcare_costs_2025:
  # Annual HIV-related healthcare cost, 2025 USD. Sum of 6 line items.
  # total = 70162. UNVERIFIED - line items not found in paper.
  annual_hiv_healthcare_costs:
    components: [43, 5903, 9912, 8833, 31257, 14214]
    total: 70162
  # Annual non-HIV healthcare cost, 2025 USD. UNVERIFIED - not in paper.
  annual_nonhiv_healthcare_costs: 5804
  # Annual ART drug cost, 2025 USD. UNVERIFIED - not in paper (distinct from the
  # finalized C_ART = 50000 per-person figure used in the coverage model).
  annual_art_costs: 22288

# ---- Population sizes --------------------------------------------------------
population:
  # Total MSM aged 13-64 (2017-2021 estimate). UNVERIFIED - not reported in the
  # paper. The paper's N_HIV- is the PrEP-INDICATED MSM count (851,240), not
  # total MSM. In R this value only feeds the derived N_HIV_neg (= total_MSM -
  # HIV+ MSM), which is NOT the quantity used in the coverage equations.
  total_MSM_2021: 4230000
  # HIV-positive MSM in the U.S. (2022). VERIFIED: supplementary_material.tex
  # Table "Population parameters" (tab:supp-pop-params, line 862) = 638,900,
  # cited to HIV.gov (Fed_HIV_stats). Also in paper.tex line 284 (N_HIV+).
  total_MSM_with_hiv_2022: 638900
  # Total (all) HIV-positive individuals in the U.S. (2022). VERIFIED: supp
  # tab:supp-pop-params line 863 = 1,218,400, cited to HIV.gov. MSM share
  # 638,900/1,218,400 = 52.4% matches supp line 802.
  total_num_hiv_infected_2022: 1218400
  # MSM with PrEP clinical indication (2018). VERIFIED: supp tab:supp-pop-params
  # line 864 = 851,240 (N_HIV-), cited to Bonacci et al. 2023 (prepcosts2018).
  total_num_prep_indication_MSM_2018: 851240
  # All adults with PrEP indication (2018). VERIFIED: supp tab:supp-pop-params
  # line 865 = 1,216,210, cited to prepcosts2018. MSM share
  # 851,240/1,216,210 = 70.0% matches supp line 805.
  total_num_prep_indication_pop_2018: 1216210

# ---- Government funding (USD) -----------------------------------------------
government_funding:
  # ART base funding, FY2022. VERIFIED: supp line 797 states "$28.7 billion
  # (base)" for ART-related programs, cited to KFF2023. R uses 28.71e9 (paper
  # rounds to 28.7). Minor rounding difference only.
  # (written in scientific notation so R parses as double, not overflowed int)
  govt_fund_art: 28.71e9

  # PrEP base funding, FY2022. VERIFIED (total): supp line 798 states "$7.1
  # billion (base)" for PrEP-related programs, cited to KFF2023. R builds it as
  # (2.68 + 1.08 + 3.34) * 1e9 = 7.1e9. The 3-way breakdown is NOT in the paper
  # (UNVERIFIED components); the total matches.
  govt_fund_prep:
    components_billion: [2.68, 1.08, 3.34]
    total: 7.1e9

  # ART discretionary funding, 2025. VERIFIED (total ~ paper): supp line 797
  # states "$6.7 billion (discretionary)" for ART, cited to KFF2023. R builds it
  # as (2581.04 + 157.25 + 3294.00 + 119.3 + 60.00 + 505.00) * 1e6 = 6716.59e6
  # = $6.72B. The 6-item breakdown is NOT in the paper (UNVERIFIED components);
  # total matches paper's rounded $6.7B.
  govt_fund_discretion_art:
    components_million: [2581.04, 157.25, 3294.00, 119.3, 60.00, 505.00]
    total: 6716.59e6

  # PrEP discretionary funding, 2025. VERIFIED: supp line 798 states "$1.0
  # billion (discretionary)" for PrEP, cited to KFF2023. R uses 1013.71e6 =
  # $1.01B, matching paper's rounded $1.0B.
  govt_fund_discretion_prep: 1013.71e6

# ---- Finalized per-person annual cost (2025 USD) ----------------------------
per_person_costs:
  # Annual per-person cost of ART. VERIFIED: C_ART = $50,000 (2025 USD).
  # supplementary_material.tex line 824 (midpoint of Bingham et al. 2021 range),
  # and paper.tex line 284. Sensitivity range $45,600-$54,000.
  C_ART: 50000
  # Annual per-person cost of PrEP. VERIFIED: C_PrEP = $21,000 (2025 USD).
  # supplementary_material.tex line 835, and paper.tex line 284. Cited to
  # Bonacci et al. 2023 (prepcosts2018).
  C_PrEP: 21000

# ---- Coverage-model parameters (base case) ----------------------------------
coverage_model:
  # ART inefficiency factor. VERIFIED: base case 1.26 (range 1.2-1.4).
  # supplementary_material.tex tab:supp-param-estimates line 895 and line 903.
  alpha_ART: 1.26
  # PrEP inefficiency factor. VERIFIED: base case 4.0 (range 3.0-5.0).
  # supplementary_material.tex tab:supp-param-estimates line 896 and line 903.
  beta_PrEP: 4.0
  # Private ART access fraction (substitution floor). VERIFIED: base case 0.15
  # (range 0.10-0.25). supp tab:supp-param-estimates line 897, discussed line
  # 907 (~15% of HIV+ MSM access ART via private insurance).
  gamma_ART: 0.15
  # Private PrEP access fraction (substitution floor). VERIFIED: base case 0.28
  # (range 0.20-0.35). supp tab:supp-param-estimates line 898, discussed line
  # 910 (derived as 0.78 x baseline PrEP coverage).
  gamma_PrEP: 0.28

# ---- Surrogate grid / prediction settings -----------------------------------
grid:
  # Grid resolution per axis. UNVERIFIED - specific value 101 not in paper. The
  # paper (paper.tex line 322) describes a 30-point Latin hypercube design over
  # the coverage-reduction space, and 100 calibrated checkpoints; a dense
  # 101-per-axis grid is an implementation detail not documented in the paper.
  ngrid: 101
  # Surrogate draws per calibrated checkpoint. UNVERIFIED - value 50 not stated
  # in paper. Paper references 100 checkpoints (supp line 727, paper line 322)
  # but not this per-checkpoint sample count.
  n_samples_per_checkpoint: 50
  # Reported year / surrogate trajectory tick. VERIFIED (consistent): the paper
  # reports outcomes at a 10-year horizon (paper.tex lines 322, 335; supp line
  # 727 "additional 10 years"). horizon_tick = 10.
  horizon_tick: 10
  # Posterior predictive interval bounds. VERIFIED (consistent): the paper
  # reports 95% posterior predictive / simulation intervals (paper.tex lines
  # 322, 324). c(0.025, 0.975) gives the central 95% interval.
  ci_probs: [0.025, 0.975]
